<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Sixstring Icon V2: Modern - strings converge, "6" motif, gradient ring -->
  <defs>
    <linearGradient id="bg2i" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="ring2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="50%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" rx="40" fill="url(#bg2i)"/>

  <!-- Outer rosette with gradient -->
  <circle cx="100" cy="100" r="64" fill="none" stroke="url(#ring2)" stroke-width="4.5"/>

  <!-- 6 broken arcs -->
  <path d="M100 38 A62 62 0 0 1 148 66" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
  <path d="M153 80 A62 62 0 0 1 153 120" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
  <path d="M148 134 A62 62 0 0 1 100 162" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
  <path d="M86 161 A62 62 0 0 1 52 134" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
  <path d="M47 120 A62 62 0 0 1 47 80" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
  <path d="M52 66 A62 62 0 0 1 86 39" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>

  <!-- Sound hole -->
  <circle cx="100" cy="100" r="44" fill="#080d16"/>

  <!-- Ghost "6" -->
  <text x="100" y="118" text-anchor="middle" font-family="SF Pro Display, Helvetica, Arial" font-size="56" font-weight="200" fill="#F97316" opacity="0.2">6</text>

  <!-- 6 strings converging to center from top -->
  <line x1="76" y1="36" x2="96" y2="96" stroke="#F97316" stroke-width="0.7" opacity="0.55"/>
  <line x1="85" y1="36" x2="97" y2="96" stroke="#F97316" stroke-width="0.9" opacity="0.55"/>
  <line x1="95" y1="36" x2="99" y2="96" stroke="#F97316" stroke-width="1.1" opacity="0.6"/>
  <line x1="105" y1="36" x2="101" y2="96" stroke="#F97316" stroke-width="1.1" opacity="0.6"/>
  <line x1="115" y1="36" x2="103" y2="96" stroke="#F97316" stroke-width="0.9" opacity="0.55"/>
  <line x1="124" y1="36" x2="104" y2="96" stroke="#F97316" stroke-width="0.7" opacity="0.55"/>

  <!-- Strings fanning out below -->
  <line x1="96" y1="104" x2="76" y2="164" stroke="#F97316" stroke-width="0.7" opacity="0.35"/>
  <line x1="97" y1="104" x2="85" y2="164" stroke="#F97316" stroke-width="0.9" opacity="0.35"/>
  <line x1="99" y1="104" x2="95" y2="164" stroke="#F97316" stroke-width="1.1" opacity="0.4"/>
  <line x1="101" y1="104" x2="105" y2="164" stroke="#F97316" stroke-width="1.1" opacity="0.4"/>
  <line x1="103" y1="104" x2="115" y2="164" stroke="#F97316" stroke-width="0.9" opacity="0.35"/>
  <line x1="104" y1="104" x2="124" y2="164" stroke="#F97316" stroke-width="0.7" opacity="0.35"/>

  <!-- Center bridge -->
  <circle cx="100" cy="100" r="3" fill="#F97316" opacity="0.9"/>
</svg>