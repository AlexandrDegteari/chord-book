<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Sixstring Final Icon: Bold, high-contrast, full-bleed for app icon -->
  <defs>
    <linearGradient id="bgFinal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2a4a"/>
      <stop offset="100%" stop-color="#0f1a35"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="50%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background (no rounded corners - OS applies mask) -->
  <rect width="200" height="200" fill="url(#bgFinal)"/>

  <!-- Outer rosette ring - THICK and bright -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#FF8C42" stroke-width="6"/>

  <!-- Decorative outer thin ring -->
  <circle cx="100" cy="100" r="77" fill="none" stroke="#FF8C42" stroke-width="1.5" opacity="0.4"/>

  <!-- Sound hole -->
  <circle cx="100" cy="100" r="56" fill="#0a1225"/>

  <!-- Inner ring decoration -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#FF8C42" stroke-width="1.5" opacity="0.45"/>

  <!-- 6 strings - BOLD -->
  <line x1="76" y1="30" x2="76" y2="170" stroke="#FFB347" stroke-width="1.5" opacity="0.55"/>
  <line x1="86" y1="26" x2="86" y2="174" stroke="#FFB347" stroke-width="1.8" opacity="0.6"/>
  <line x1="95" y1="24" x2="95" y2="176" stroke="#FFB347" stroke-width="2.0" opacity="0.65"/>
  <line x1="105" y1="24" x2="105" y2="176" stroke="#FFB347" stroke-width="2.0" opacity="0.65"/>
  <line x1="114" y1="26" x2="114" y2="174" stroke="#FFB347" stroke-width="1.8" opacity="0.6"/>
  <line x1="124" y1="30" x2="124" y2="170" stroke="#FFB347" stroke-width="1.5" opacity="0.55"/>

  <!-- Nut (top bar) - bold -->
  <line x1="70" y1="64" x2="130" y2="64" stroke="#FFD280" stroke-width="4" opacity="0.85"/>

  <!-- Fret lines -->
  <line x1="70" y1="84" x2="130" y2="84" stroke="#FF8C42" stroke-width="1.2" opacity="0.3"/>
  <line x1="70" y1="104" x2="130" y2="104" stroke="#FF8C42" stroke-width="1.2" opacity="0.3"/>
  <line x1="70" y1="124" x2="130" y2="124" stroke="#FF8C42" stroke-width="1.2" opacity="0.3"/>

  <!-- Am chord: X 0 2 2 1 0 -->

  <!-- Finger dots - LARGE, solid bright orange -->
  <!-- String 3 (95), fret 2 -->
  <circle cx="95" cy="114" r="8" fill="#FF8C42"/>
  <!-- String 4 (105), fret 2 -->
  <circle cx="105" cy="114" r="8" fill="#FF8C42"/>
  <!-- String 2 (114), fret 1 -->
  <circle cx="114" cy="74" r="8" fill="#FF8C42"/>

  <!-- Open strings - bold circles above nut -->
  <circle cx="86" cy="51" r="6" fill="none" stroke="#FFD280" stroke-width="2.5" opacity="0.9"/>
  <circle cx="124" cy="51" r="6" fill="none" stroke="#FFD280" stroke-width="2.5" opacity="0.9"/>

  <!-- Muted string 6 (76) - X mark -->
  <line x1="69" y1="44" x2="83" y2="58" stroke="#FFD280" stroke-width="3" opacity="0.85"/>
  <line x1="83" y1="44" x2="69" y2="58" stroke="#FFD280" stroke-width="3" opacity="0.85"/>

  <!-- Bridge line -->
  <line x1="70" y1="136" x2="130" y2="136" stroke="#FF8C42" stroke-width="2.5" opacity="0.55"/>
</svg>